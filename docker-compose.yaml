services:
  librarium-api:
    build:
      context: .
      dockerfile: src/Librarium.Api/dockerfile
    ports:
      - "8080:8080"
    environment:
      - AppInfrastructureOptions__ConnectionString=${LIBRARIUM_CONNECTION_STRING}
      - AppInfrastructureOptions__DatabaseProvider=${LIBRARIUM_DATABASE_PROVIDER}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      librarium-db:
        condition: service_healthy

  librarium-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${LIBRARIUM_DB_PASSWORD}
    volumes:
      - librarium-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${LIBRARIUM_DB_PASSWORD} -Q 'SELECT 1' -No -C"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  flyway:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ./migrations/sql:/flyway/sql
    environment:
      FLYWAY_URL: ${FLYWAY_URL}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD}
    depends_on:
      librarium-db:
        condition: service_healthy

volumes:
  librarium-db-data: